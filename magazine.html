---
layout: default
title: Magazine
---

<div class="posts">
  {% for post in site.posts %}
  <div class="post">
    <h2 class="service-title">
      <a href="{{ post.url | absolute_url }}">
        {{ post.title }}
      </a>
    </h2>

    <p>{{ post.date | date_to_string }}</p>
    <p>{{ post.content | strip_html | truncatewords:30 }}</p>
    
  </div>
  {% endfor %}
</div>
